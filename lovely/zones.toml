[manifest]
version = "0.1.0"
dump_lua = true
priority = 0

# Add manager area to joker evaluation
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "-- TARGET: add your own CardAreas for joker evaluation"
position = 'before'
match_indent = true
payload = '''
if Pokerleven and Pokerleven.ina_manager_area and type(Pokerleven.ina_manager_area.cards) == "table" then
    table.insert(t, Pokerleven.ina_manager_area)
end
if Pokerleven and Pokerleven.ina_spirits_area and type(Pokerleven.ina_spirits_area.cards) == "table" then
    table.insert(t, Pokerleven.ina_spirits_area)
end
'''

# Add joker to managers when buying from the shop
[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = "G.jokers:emplace(c1)"
position = 'at'
match_indent = true
payload = '''
if Pokerleven and Pokerleven.is_manager(c1) then
    Pokerleven.add_to_managers(c1)
elseif Pokerleven and Pokerleven.is_spirit(c1) then
    Pokerleven.add_to_spirits(c1)
else
    G.jokers:emplace(c1)
end
'''

# Add joker to managers/spirits when using add_joker (Collection spawn or tags)
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "if _area and card.ability.set == 'Joker' then _area:emplace(card)"
position = 'at'
match_indent = true
payload = '''
if _area and card.ability.set == 'Joker' then
    if Pokerleven and Pokerleven.is_manager(card) then Pokerleven.add_to_managers(card)
    elseif Pokerleven and Pokerleven.is_spirit(card) then Pokerleven.add_to_spirits(card)
    else _area:emplace(card) end
'''

# Add joker to managers when selecting from a pack
[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = "elseif card.ability.set == 'Joker' then"
position = 'before'
match_indent = true
payload = '''
elseif card.ability.set == 'Joker' and Pokerleven and Pokerleven.is_manager(card) then
    Pokerleven.add_to_managers(card)
    play_sound('card1', 0.8, 0.6)
    play_sound('generic1')
    dont_dissolve = true
    delay_fac = 0.2
elseif card.ability.set == 'Joker' and Pokerleven and Pokerleven.is_spirit(card) then
    Pokerleven.add_to_spirits(card)
    play_sound('card1', 0.8, 0.6)
    play_sound('generic1')
    dont_dissolve = true
    delay_fac = 0.2
'''

# Change other_joker key
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "-- TARGET: add context.other_something identifier to your cards"
position = 'before'
match_indent = true
payload = '''
if Pokerleven and Pokerleven.is_manager(_card) then other_key = 'other_manager' end
if Pokerleven and Pokerleven.is_spirit(_card) then other_key = 'other_spirit' end
'''

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''print("ERROR LOADING GAME: Card area '"..k.."' not instantiated before load") end'''
position = 'at'
match_indent = true
payload = '''
local skip_print = k == "shop_jokers" or k == "shop_vouchers" or k == "shop_booster"
    if not skip_print then
        print("ERROR LOADING GAME: Card area '" .. k .. "' not instantiated before load")
    end
end
'''

# Change background color
[[patches]]
[patches.pattern]
target = "cardarea.lua"
pattern = "{n=G.UIT.R, config={minw = self.T.w,minh = self.T.h,align = \"cm\", padding = 0.1, mid = true, r = 0.1, colour = self ~= G.shop_vouchers and {0,0,0,0.1} or nil, ref_table = self}, nodes={"
position = 'at'
match_indent = true
payload = '''
{n=G.UIT.R, config={minw = self.T.w,minh = self.T.h,align = "cm", padding = 0.1, mid = true, r = 0.1, colour = self == G.ina_bench_area and G.ARGS.LOC_COLOURS["bench"] or self ~= G.shop_vouchers and {0,0,0,0.1} or nil, ref_table = self}, nodes={
'''
