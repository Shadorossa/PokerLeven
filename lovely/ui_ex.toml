# Mover el Deck al HUD (A la derecha de manos y dinero, compactando)
[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''              {n=G.UIT.R, config={align = "cm", id = 'row_round'}, nodes={
                {n=G.UIT.C, config={align = "cm"}, nodes=contents.buttons},
                {n=G.UIT.C, config={align = "cm"}, nodes=contents.round}
              }},'''
position = 'at'
match_indent = true
payload = '''              (function()
                if contents.hand and contents.hand.config then contents.hand.config.padding = 0.01 end
                if contents.round[1] and contents.round[1].nodes then
                  contents.round[1].nodes[1].config.minw = 0.8
                  contents.round[1].nodes[1].config.minh = 0.8
                  contents.round[1].nodes[3].config.minw = 0.8
                  contents.round[1].nodes[3].config.minh = 0.8
                  contents.round[1].config.scale = 0.65
                end
                if contents.round[3] and contents.round[3].nodes then
                  contents.round[3].nodes[1].config.minw = 1.8
                  contents.round[3].nodes[1].config.minh = 0.8
                  contents.round[3].config.scale = 0.65
                end
                if contents.round[5] and contents.round[5].nodes then
                  contents.round[5].nodes[1].config.minw = 0.8
                  contents.round[5].nodes[1].config.minh = 0.8
                  contents.round[5].nodes[3].config.minw = 0.8
                  contents.round[5].nodes[3].config.minh = 0.8
                  contents.round[5].config.scale = 0.65
                end
                if contents.hand and contents.hand.nodes and contents.hand.nodes[1] and contents.hand.nodes[1].nodes then
                  local hand_col = contents.hand.nodes[1]
                  if hand_col.nodes[1] then hand_col.nodes[1].config.minh = 0.7 end
                  local ch_row = hand_col.nodes[2]
                  if ch_row then
                    ch_row.config.padding = 0.02
                    ch_row.config.minh = 0.7
                    if ch_row.nodes[1] then ch_row.nodes[1].config.minw = 1.3; ch_row.nodes[1].config.minh = 0.7 end
                    if ch_row.nodes[3] then ch_row.nodes[3].config.minw = 1.3; ch_row.nodes[3].config.minh = 0.7 end
                  end
                end
                if contents.round[5] then contents.round[5].config.align = "cl" end
                if contents.round[7] then contents.round[7].config.align = "cl" end
                return {n=G.UIT.R, config={align = "cl", id = 'row_round'}, nodes={
                  {n=G.UIT.C, config={align = "cl"}, nodes={
                    {n=G.UIT.R, config={align = "cl"}, nodes={
                      {n=G.UIT.C, config={align = "cl", padding = 0.01}, nodes={
                        contents.round[1],
                        contents.round[2],
                        contents.round[3]
                      }},
                      {n=G.UIT.C, config={align = "cm", padding = 0.02}, nodes={
                        {n=G.UIT.O, config={object = G.deck}}
                      }}
                    }},
                    contents.round[4],
                    contents.round[5],
                    contents.round[6],
                    contents.round[7]
                  }}
                }}
              end)(),'''

