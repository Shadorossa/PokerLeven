# Ajustar posición y ancho de Jokers y Consumibles
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''        G.jokers.T.x = G.hand.T.x - 0.1
        G.jokers.T.y = 0

        G.consumeables.T.x = G.jokers.T.x + G.jokers.T.w + 0.2
        G.consumeables.T.y = 0'''
position = 'at'
match_indent = true
payload = '''        G.jokers.T.x = G.hand.T.x - 0.1
        G.jokers.T.y = -0.55
        G.jokers.T.w = math.max(1, G.jokers.config.card_limit) * G.CARD_W * 0.72

        G.consumeables.T.x = G.jokers.T.x + G.jokers.T.w + 1
        G.consumeables.T.y = -0.55
        G.consumeables.T.w = math.max(1, G.consumeables.config.card_limit) * G.CARD_W * 0.72'''

